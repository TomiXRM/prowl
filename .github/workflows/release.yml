name: release

# `v*` タグ push（または手動）で macOS(.app/.dmg) と Linux(tar.gz) を作り、
# チェックサムと共に DRAFT リリースへアップロードする（公開は手動レビュー後）。
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos-arm64
            kind: macos
          - os: ubuntu-latest
            target: linux-x86_64
            kind: linux
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # GPUI(Blade) の Linux ビルド依存
      - name: Install Linux system dependencies
        if: matrix.kind == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev \
            libx11-dev libxcb1-dev libfontconfig-dev libfreetype-dev \
            libasound2-dev libvulkan-dev libzstd-dev

      # 署名/公証はシークレットが揃っているときだけ有効化（無ければ ad-hoc にフォールバック）。
      - name: Detect macOS signing
        if: matrix.kind == 'macos'
        id: macsign
        run: echo "enabled=${{ secrets.MACOS_CERTIFICATE != '' }}" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID certificate
        if: matrix.kind == 'macos' && steps.macsign.outputs.enabled == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/prowl-signing.keychain-db"
          KCPW="$(uuidgen)"
          security create-keychain -p "$KCPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KCPW" "$KEYCHAIN"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$MACOS_CERTIFICATE_PWD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KCPW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Bundle macOS (.app + .dmg)
        if: matrix.kind == 'macos'
        env:
          # 空ならxtaskが ad-hoc にフォールバックする。
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          cargo run -p xtask -- bundle-macos
          cargo run -p xtask -- dmg-macos

      - name: Notarize & staple (.dmg)
        if: matrix.kind == 'macos' && steps.macsign.outputs.enabled == 'true'
        env:
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
        run: cargo run -p xtask -- notarize-macos

      - name: Build + bundle Linux (tar.gz)
        if: matrix.kind == 'linux'
        run: |
          cargo build --release -p prowl --features gpui
          cargo run -p xtask -- bundle-linux --bin target/release/prowl

      - name: Checksums
        working-directory: target/dist
        run: |
          shopt -s nullglob
          files=( *.dmg *.tar.gz )
          [ ${#files[@]} -gt 0 ] && shasum -a 256 "${files[@]}" > "SHA256SUMS-${{ matrix.target }}.txt" || true

      - name: Upload to draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            target/dist/*.dmg
            target/dist/*.tar.gz
            target/dist/SHA256SUMS-*.txt
