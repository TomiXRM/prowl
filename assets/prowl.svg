<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-labelledby="title desc">
  <title id="title">RJ45 App Icon — White Apple-like style</title>
  <desc id="desc">A clean white rounded-square app icon with a softly rendered RJ45 Ethernet port, eight gold pins, and subtle network activity lights.</desc>
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.52" stop-color="#f7f9fc"/>
      <stop offset="1" stop-color="#e5ebf4"/>
    </linearGradient>
    <radialGradient id="tileHighlight" cx="0.28" cy="0.16" r="0.88">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c9d4e2"/>
    </linearGradient>
    <linearGradient id="metalFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.18" stop-color="#eef3f8"/>
      <stop offset="0.53" stop-color="#d0dae5"/>
      <stop offset="1" stop-color="#aebccc"/>
    </linearGradient>
    <linearGradient id="metalEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.52" stop-color="#d9e2ec"/>
      <stop offset="1" stop-color="#8394a8"/>
    </linearGradient>
    <linearGradient id="socket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#263342"/>
      <stop offset="0.58" stop-color="#111a23"/>
      <stop offset="1" stop-color="#071017"/>
    </linearGradient>
    <linearGradient id="socketWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6a7a8c" stop-opacity="0.74"/>
      <stop offset="1" stop-color="#101922" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff7cb"/>
      <stop offset="0.36" stop-color="#ffd45e"/>
      <stop offset="1" stop-color="#c88416"/>
    </linearGradient>
    <linearGradient id="greenLed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c9fff0"/>
      <stop offset="0.45" stop-color="#34e49a"/>
      <stop offset="1" stop-color="#00a86c"/>
    </linearGradient>
    <linearGradient id="blueLed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9f2ff"/>
      <stop offset="0.48" stop-color="#55b9ff"/>
      <stop offset="1" stop-color="#1477d4"/>
    </linearGradient>
    <radialGradient id="greenGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#34e49a" stop-opacity="0.72"/>
      <stop offset="0.48" stop-color="#34e49a" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#34e49a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#55b9ff" stop-opacity="0.66"/>
      <stop offset="0.52" stop-color="#55b9ff" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#55b9ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur26" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="blur36" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
    <clipPath id="tileClip">
      <rect x="64" y="64" width="896" height="896" rx="206"/>
    </clipPath>
  </defs>

  <!-- App tile shadow and white base. -->
  <rect x="78" y="92" width="868" height="852" rx="196" fill="#405b74" opacity="0.16" filter="url(#blur36)"/>
  <rect x="64" y="64" width="896" height="896" rx="206" fill="url(#tile)"/>
  <rect x="65.5" y="65.5" width="893" height="893" rx="204" fill="none" stroke="url(#rim)" stroke-width="3"/>
  <g clip-path="url(#tileClip)">
    <rect x="64" y="64" width="896" height="896" rx="206" fill="url(#tileHighlight)"/>
    <g opacity="0.12" fill="none" stroke-linecap="round">
      <path d="M187 735 C298 641 385 598 512 598 C639 598 726 641 837 735" stroke="#3f8cff" stroke-width="18"/>
      <path d="M250 793 C338 723 415 690 512 690 C609 690 686 723 774 793" stroke="#26c78f" stroke-width="14"/>
      <path d="M325 849 C385 811 441 793 512 793 C583 793 639 811 699 849" stroke="#3f8cff" stroke-width="10"/>
    </g>
  </g>

  <!-- device (port + LEDs) scaled up to reduce inner margin -->
  <g transform="translate(512 540) scale(1.22) translate(-512 -540)">
  <!-- RJ45 port shadow. -->
  <path d="M223 360 C223 328 249 302 281 302 H743 C775 302 801 328 801 360 V687 C801 719 775 745 743 745 H281 C249 745 223 719 223 687 Z"
        fill="#263545" opacity="0.22" filter="url(#blur26)"/>

  <!-- Main RJ45 port. -->
  <g>
    <path d="M223 328 C223 296 249 270 281 270 H743 C775 270 801 296 801 328 V655 C801 687 775 713 743 713 H281 C249 713 223 687 223 655 Z"
          fill="url(#metalEdge)"/>
    <path d="M246 337 C246 313 266 293 290 293 H734 C758 293 778 313 778 337 V641 C778 665 758 685 734 685 H290 C266 685 246 665 246 641 Z"
          fill="url(#metalFront)"/>
    <path d="M291 304 H733 C747 304 759 316 759 331 V354 H265 V331 C265 316 277 304 291 304 Z"
          fill="#ffffff" opacity="0.58"/>
    <path d="M246 641 C246 665 266 685 290 685 H734 C758 685 778 665 778 641 V610 C756 645 712 660 653 660 H371 C313 660 269 645 246 610 Z"
          fill="#8fa0b2" opacity="0.22"/>

    <!-- Socket shadow and cutout. -->
    <path d="M313 390 C313 368 331 350 353 350 H671 C693 350 711 368 711 390 V545 C711 567 693 585 671 585 H603 V627 C603 646 588 661 569 661 H455 C436 661 421 646 421 627 V585 H353 C331 585 313 567 313 545 Z"
          fill="#000000" opacity="0.28"/>
    <path d="M313 380 C313 358 331 340 353 340 H671 C693 340 711 358 711 380 V535 C711 557 693 575 671 575 H603 V617 C603 636 588 651 569 651 H455 C436 651 421 636 421 617 V575 H353 C331 575 313 557 313 535 Z"
          fill="url(#socket)"/>
    <path d="M337 386 C337 374 347 364 359 364 H665 C677 364 687 374 687 386 V414 H337 Z"
          fill="url(#socketWall)" opacity="0.78"/>
    <path d="M337 535 C337 544 344 551 353 551 H438 V615 C438 624 446 632 455 632 H569 C578 632 586 624 586 615 V551 H671 C680 551 687 544 687 535"
          fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="7" stroke-linecap="round"/>

    <!-- Eight contacts. -->
    <g>
      <rect x="366" y="366" width="22" height="95" rx="8" fill="url(#gold)"/>
      <rect x="405" y="366" width="22" height="95" rx="8" fill="url(#gold)"/>
      <rect x="444" y="366" width="22" height="95" rx="8" fill="url(#gold)"/>
      <rect x="483" y="366" width="22" height="95" rx="8" fill="url(#gold)"/>
      <rect x="522" y="366" width="22" height="95" rx="8" fill="url(#gold)"/>
      <rect x="561" y="366" width="22" height="95" rx="8" fill="url(#gold)"/>
      <rect x="600" y="366" width="22" height="95" rx="8" fill="url(#gold)"/>
      <rect x="639" y="366" width="22" height="95" rx="8" fill="url(#gold)"/>
      <g opacity="0.5" fill="#ffffff">
        <rect x="370" y="372" width="6" height="35" rx="3"/>
        <rect x="409" y="372" width="6" height="35" rx="3"/>
        <rect x="448" y="372" width="6" height="35" rx="3"/>
        <rect x="487" y="372" width="6" height="35" rx="3"/>
        <rect x="526" y="372" width="6" height="35" rx="3"/>
        <rect x="565" y="372" width="6" height="35" rx="3"/>
        <rect x="604" y="372" width="6" height="35" rx="3"/>
        <rect x="643" y="372" width="6" height="35" rx="3"/>
      </g>
    </g>

    <!-- Small fasteners / industrial cue, muted. -->
    <g opacity="0.58">
      <circle cx="306" cy="632" r="18" fill="#d4dde8"/>
      <circle cx="718" cy="632" r="18" fill="#d4dde8"/>
      <circle cx="306" cy="632" r="8" fill="#aebaca"/>
      <circle cx="718" cy="632" r="8" fill="#aebaca"/>
    </g>
  </g>

  <!-- Activity LEDs. -->
  <g>
    <circle cx="377" cy="770" r="66" fill="url(#greenGlow)" filter="url(#blur26)"/>
    <circle cx="647" cy="770" r="60" fill="url(#blueGlow)" filter="url(#blur26)"/>
    <circle cx="377" cy="770" r="30" fill="url(#greenLed)"/>
    <circle cx="377" cy="770" r="30" fill="none" stroke="#ffffff" stroke-opacity="0.82" stroke-width="5"/>
    <circle cx="647" cy="770" r="25" fill="url(#blueLed)" opacity="0.96"/>
    <circle cx="647" cy="770" r="25" fill="none" stroke="#ffffff" stroke-opacity="0.78" stroke-width="5"/>
  </g>
  </g>

  <path d="M226 171 C313 112 445 91 573 106 C681 119 766 163 811 222"
        fill="none" stroke="#ffffff" stroke-opacity="0.62" stroke-width="20" stroke-linecap="round"/>
</svg>
